{{- if eq .Values.provider "github" }}
{{- if not .Values.github.app.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.github.app.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dagger-runners.labels" . | nindent 4 }}
type: Opaque
data:
  github_app_id: {{ .Values.github.app.id | toString | b64enc }}
  github_app_installation_id: {{ .Values.github.app.installationId | toString | b64enc }}
  github_app_private_key: {{ .Values.github.app.privateKey | b64enc }}
{{- end }}
{{- end }}
