{{- if eq .Values.provider "github" }}
---
# Allow the ARC controller (running in arc-systems) to operate in this
# runner namespace. Required permissions:
#   - manage secrets (gh-app-credentials + per-runner registration token secrets)
#   - manage Roles/RoleBindings/ServiceAccounts/Pods (for listener + runner pods)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arc-controller-runner-ns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dagger-runners.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-controller-runner-ns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dagger-runners.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.arcControllerServiceAccount }}
    namespace: {{ .Values.arcControllerNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arc-controller-runner-ns
{{- end }}
