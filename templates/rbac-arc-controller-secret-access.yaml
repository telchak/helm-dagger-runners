{{- if eq .Values.provider "github" }}
{{- $secretName := .Values.github.app.secretName }}
{{- if .Values.github.app.existingSecretName }}
{{- $secretName = .Values.github.app.existingSecretName }}
{{- end }}
---
# Allow the ARC controller (running in arc-systems) to read the GitHub App
# credentials secret from this namespace. The controller needs this to
# register runner scale sets with GitHub Actions.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arc-controller-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dagger-runners.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ $secretName }}"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-controller-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dagger-runners.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.arcControllerServiceAccount }}
    namespace: {{ .Values.arcControllerNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arc-controller-secret-reader
{{- end }}
