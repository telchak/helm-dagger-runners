{{- if eq .Values.provider "github" }}
{{- $secretName := .Values.github.app.secretName }}
{{- if .Values.github.app.existingSecretName }}
{{- $secretName = .Values.github.app.existingSecretName }}
{{- end }}
---
# Allow the ARC controller (running in arc-systems) to operate in this
# runner namespace. Required permissions:
#   - read the GitHub App secret (to register scale sets)
#   - manage Roles/RoleBindings/ServiceAccounts/Pods (for listener pods)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arc-controller-runner-ns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dagger-runners.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ $secretName }}"]
    verbs: ["get"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-controller-runner-ns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dagger-runners.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.arcControllerServiceAccount }}
    namespace: {{ .Values.arcControllerNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arc-controller-runner-ns
{{- end }}
